# Oh Hell — PPO self-play, curriculum 3->5->7->10 tricks, 1024-wide networks.
# Curriculum progressively increases hand sizes so the model learns
# basic bid/play strategy on easier games before tackling larger ones.

game:
  name: oh_hell
  players: 4
  num_cards_per_suit: 13
  num_suits: 4
  max_tricks: 10          # final target; overridden by curriculum during training
  off_bid_penalty: false
  points_per_trick: 1

agent:
  hidden_layers_sizes: [1024, 1024]
  lr: 3.0e-4
  bid_lr: 1.0e-3
  gamma: 1.0
  gae_lambda: 0.92
  clip_epsilon: 0.2
  entropy_coef: 0.05
  bid_entropy_coef: 0.15
  value_coef: 1.0
  max_grad_norm: 0.5
  bid_ppo_epochs: 4
  play_ppo_epochs: 4
  batch_size: 256
  episodes_per_iter: 2048
  pool_size: 20
  pool_save_interval: 10
  eval_episodes: 500
  lr_schedule: cosine

curriculum:
  - until_iter: 1000
    max_tricks: 3
  - until_iter: 2500
    max_tricks: 5
  - until_iter: 4000
    max_tricks: 7
  - until_iter: 6000
    max_tricks: 10

training:
  num_iterations: 5000
  device: cpu
  num_workers: 28          # reduce to 4 for laptop, 28 for 32-core
  checkpoint: checkpoints/oh_hell_ppo_curriculum.pt
  log_interval: 10
  wandb:
    enabled: true
    project: rlgames
    run_name: oh_hell_ppo_curriculum
