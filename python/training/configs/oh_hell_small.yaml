# Oh Hell — small variant for local CPU training.
# 2 tricks fixed, quick to train, good for iteration and testing.

game:
  name: oh_hell
  players: 4
  num_cards_per_suit: 13
  num_suits: 4
  num_tricks_fixed: 2
  off_bid_penalty: false
  points_per_trick: 1

agent:
  hidden_layers_sizes: [256, 256]
  replay_buffer_capacity: 50000
  batch_size: 128
  learning_rate: 0.001
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_fraction: 0.8
  update_target_network_every: 500
  learn_every: 10

training:
  num_episodes: 50000
  device: cpu
  checkpoint: checkpoints/oh_hell_small.pt
  log_interval: 10000
  wandb:
    enabled: false
    project: rlgames
    run_name: oh_hell_small
