# Oh Hell — PPO self-play, fixed 3 tricks.
# Separate bid and play networks with policy pool opponents.

game:
  name: oh_hell
  players: 4
  num_cards_per_suit: 13
  num_suits: 4
  num_tricks_fixed: 3
  off_bid_penalty: false
  points_per_trick: 1

agent:
  hidden_layers_sizes: [512, 512]
  lr: 3.0e-4
  bid_lr: 1.0e-3
  gamma: 1.0
  gae_lambda: 0.95
  clip_epsilon: 0.2
  entropy_coef: 0.05
  bid_entropy_coef: 0.10
  value_coef: 1.0
  max_grad_norm: 0.5
  bid_ppo_epochs: 4
  play_ppo_epochs: 4
  batch_size: 256
  episodes_per_iter: 2048
  pool_size: 20
  pool_save_interval: 10
  eval_episodes: 1000
  lr_schedule: cosine

training:
  num_iterations: 10000
  device: cpu
  num_workers: 4
  checkpoint: checkpoints/oh_hell_ppo_3tricks.pt
  log_interval: 10
  wandb:
    enabled: true 
    project: rlgames
    run_name: oh_hell_ppo_3tricks
