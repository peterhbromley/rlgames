# Oh Hell — full game for GPU training on GCE.
# Variable number of tricks (1-7), larger network and replay buffer.

game:
  name: oh_hell
  players: 4
  num_cards_per_suit: 13
  num_suits: 4
  # num_tricks_fixed is omitted → variable tricks (full game)
  max_tricks: 7    # re-roll hands with more than 7 tricks; keeps full 52-card deck
  off_bid_penalty: false
  points_per_trick: 1

agent:
  hidden_layers_sizes: [512, 512, 256]
  replay_buffer_capacity: 200000
  batch_size: 256
  learning_rate: 0.0005
  epsilon_start: 1.0
  epsilon_end: 0.02
  epsilon_decay_fraction: 0.7
  update_target_network_every: 1000
  learn_every: 10

training:
  num_episodes: 500000
  device: cuda
  checkpoint: checkpoints/oh_hell_full.pt
  log_interval: 10000
  wandb:
    enabled: true
    project: rlgames
    run_name: oh_hell_full
