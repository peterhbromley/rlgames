# Oh Hell — NFSP, fixed 3 tricks.
# Diagnostic run to compare NFSP against DQN baseline.

game:
  name: oh_hell
  players: 4
  num_cards_per_suit: 13
  num_suits: 4
  num_tricks_fixed: 3
  off_bid_penalty: false
  points_per_trick: 1

agent:
  hidden_layers_sizes: [512, 512]
  reservoir_buffer_capacity: 1000000
  anticipatory_param: 0.1
  batch_size: 256
  rl_learning_rate: 0.0001
  sl_learning_rate: 0.001
  learn_every: 64
  gradient_clipping: 10.0
  # Inner DQN (best-response) settings
  replay_buffer_capacity: 200000
  epsilon_start: 0.06
  epsilon_end: 0.001
  epsilon_decay_duration: 10000000
  update_target_network_every: 1000
  min_buffer_size_to_learn: 1000

training:
  num_episodes: 2000000
  device: cpu
  checkpoint: checkpoints/oh_hell_nfsp_3tricks.pt
  log_interval: 10000
  wandb:
    enabled: true 
    project: rlgames
    run_name: oh_hell_nfsp_3tricks
